<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spell Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--gold-light:#e8c96a;--gold-dim:#7a5e28;--parchment:#f2e8d0;--parchment-dark:#d9c9a0;--ink:#1a120a;--ink-mid:#2c2214;--deep-bg:#0d0905}
html,body{height:100%;width:100%;overflow:hidden;background:var(--deep-bg);font-family:Georgia,'Times New Roman',serif;touch-action:none;-webkit-user-select:none;user-select:none}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(1200px 700px at 50% -120px,rgba(201,168,76,.08),transparent 70%);pointer-events:none;z-index:0}
#app{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1}
#header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 20px 10px;background:linear-gradient(to bottom,rgba(13,9,5,.95) 60%,transparent)}
#header-title{font-family:'Cinzel Decorative',serif;color:var(--gold);font-size:14px;letter-spacing:2px;text-shadow:0 0 12px rgba(201,168,76,.5)}
#counter{font-family:'Cinzel',serif;color:var(--gold-dim);font-size:12px;letter-spacing:1px}
#filters{position:fixed;top:44px;left:0;right:0;z-index:100;padding:8px 10px 12px;background:linear-gradient(to bottom,rgba(10,8,5,.98) 70%,rgba(10,8,5,.85));display:flex;flex-direction:column;gap:6px;max-height:34vh;overflow-y:auto}
#filters.collapsed .filters-body{display:none}
.filters-body{display:flex;flex-direction:column;gap:6px}
.filter-row{display:flex;gap:6px;justify-content:flex-start;flex-wrap:nowrap;overflow-x:auto;padding:1px 2px}
.filter-row::-webkit-scrollbar{height:6px}
.filter-row::-webkit-scrollbar-thumb{background:rgba(201,168,76,.35);border-radius:999px}
.search-row{display:flex;justify-content:center;align-items:center;gap:8px}
.search-input{width:min(420px,82vw);font-family:'Cinzel',serif;font-size:12px;letter-spacing:.2px;padding:7px 10px;border:1px solid var(--gold-dim);border-radius:3px;background:rgba(20,12,5,.9);color:var(--gold-light);outline:none}
.search-input::placeholder{color:rgba(201,168,76,.45)}
.search-input:focus{border-color:var(--gold);box-shadow:0 0 8px rgba(201,168,76,.25)}
.arrow-toggle{width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--gold-dim);border-radius:6px;background:rgba(20,12,5,.95);color:var(--gold-light);cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;font-size:16px;line-height:1;transition:transform .2s ease,border-color .2s ease}
.arrow-toggle:hover{border-color:var(--gold)}
.arrow-toggle .arrow{display:inline-block;transition:transform .2s ease}
#filters.collapsed .arrow-toggle .arrow{transform:rotate(180deg)}
.filter-btn{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.4px;padding:5px 10px;border:1px solid var(--gold-dim);background:rgba(20,12,5,.92);color:var(--gold-dim);border-radius:3px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.filter-btn.active{background:rgba(201,168,76,.15);color:var(--gold-light);border-color:var(--gold);box-shadow:0 0 8px rgba(201,168,76,.3)}
#swipe-hint{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;align-items:center;gap:6px;opacity:1;transition:opacity .6s;pointer-events:none}
#swipe-hint.hidden{opacity:0}
.hint-arrows{display:flex;gap:28px;align-items:center}
.hint-arrow{width:40px;height:40px;border:1.5px solid rgba(201,168,76,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(201,168,76,.6);font-size:16px;animation:pulse-hint 2s ease-in-out infinite}
.hint-arrow:first-child{animation-delay:.3s}
.hint-text{font-family:'Cinzel',serif;font-size:11px;color:rgba(201,168,76,.5);letter-spacing:2px;text-transform:uppercase}
@keyframes pulse-hint{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.8;transform:scale(1.08)}}
#card-stage{position:relative;width:min(380px,92vw);height:min(590px,70vh);margin-top:84px;transition:transform .25s ease-out}
.card{position:absolute;inset:0;border-radius:12px;overflow:hidden;cursor:grab;will-change:transform,opacity;backface-visibility:hidden;transform:translateZ(0);box-shadow:0 0 0 1px rgba(201,168,76,.3),0 8px 32px rgba(0,0,0,.7)}
.card-inner{position:relative;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden}
.card-art{position:relative;flex-shrink:0;height:33%;overflow:hidden}
.card-art-overlay{position:absolute;inset:0}
.art-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.08),rgba(0,0,0,.35) 100%)}
.level-badge{position:absolute;top:10px;left:12px;width:38px;height:38px;border-radius:50%;border:2px solid var(--gold);background:rgba(10,6,2,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;box-shadow:0 0 10px rgba(201,168,76,.4)}
.level-number{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold-light);line-height:1}
.level-label{font-family:'Cinzel',serif;font-size:7px;color:var(--gold-dim);letter-spacing:.5px}
.ritual-tag{position:absolute;top:10px;right:12px;font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;color:var(--gold-light);padding:3px 7px;border:1px solid rgba(201,168,76,.5);background:rgba(10,6,2,.8);border-radius:2px;text-transform:uppercase;z-index:10}
.school-tag{position:absolute;bottom:8px;right:12px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;color:rgba(255,255,255,.85);text-transform:uppercase;z-index:10}
.prepare-btn{position:absolute;top:54px;left:12px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.8px;color:var(--gold-dim);padding:3px 7px;border:1px solid rgba(201,168,76,.4);background:rgba(10,6,2,.8);border-radius:2px;text-transform:uppercase;z-index:11;cursor:pointer}
.prepare-btn.active{color:var(--gold-light);border-color:var(--gold);background:rgba(201,168,76,.15)}
.card-body{flex:1;display:flex;flex-direction:column;background:var(--parchment);position:relative;overflow:hidden}
.card-name{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:#1b1309;padding:10px 14px 8px;line-height:1.15;border-bottom:1px solid rgba(122,94,40,.25)}
.card-name-deco{display:none}
.card-stats{display:grid;grid-template-columns:1fr 1fr;padding:6px 14px;border-bottom:1px solid rgba(122,94,40,.2)}
.stat{display:flex;flex-direction:column;padding:3px 0}
.stat-label{font-family:'Cinzel',serif;font-size:9px;color:#705421;letter-spacing:.7px;text-transform:uppercase}
.stat-value{font-family:Georgia,'Times New Roman',serif;font-size:13px;font-weight:600;color:#2a1f12;margin-top:1px;line-height:1.3}
.card-classes{font-family:'Cinzel',serif;font-size:10px;color:#705421;letter-spacing:.2px;padding:5px 14px;border-bottom:1px solid rgba(122,94,40,.2);font-style:italic}
.card-description{flex:1;overflow-y:auto;padding:8px 14px 10px}
.description-text{font-family:Georgia,'Times New Roman',serif;font-size:14px;color:#1f160b;line-height:1.6}
.desc-para{margin-bottom:6px}
.higher-levels{margin-top:8px;padding-top:6px;border-top:1px dashed rgba(122,94,40,.3);font-style:italic;color:var(--gold-dim)}
.higher-levels-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--gold-dim);display:block;margin-bottom:3px}
.corner{display:none}
.corner-tl{top:4px;left:4px}.corner-tr{top:4px;right:4px;transform:scaleX(-1)}.corner-bl{bottom:4px;left:4px;transform:scaleY(-1)}.corner-br{bottom:4px;right:4px;transform:scale(-1)}
.card-shadow{position:absolute;inset:0;border-radius:12px;background:var(--parchment-dark);box-shadow:0 2px 12px rgba(0,0,0,.45);pointer-events:none}
.card-shadow-1{transform:translateY(4px) scale(.98);z-index:-1;opacity:.35;transition:transform .2s ease-out,opacity .2s ease-out}
.card-shadow-2{display:none}
.swipe-indicator{position:absolute;top:50%;transform:translateY(-50%);z-index:50;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:8px 14px;border:1.5px solid;border-radius:3px;opacity:0;pointer-events:none}
.swipe-left-indicator{left:14px;color:#c0392b;border-color:#c0392b;background:rgba(192,57,43,.1)}
.swipe-right-indicator{right:14px;color:#27ae60;border-color:#27ae60;background:rgba(39,174,96,.1)}
#no-results{display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-family:'Cinzel',serif;color:var(--gold-dim);font-size:13px;text-align:center;padding:20px}
@keyframes fly-left{from{transform:translateX(0) rotate(0deg);opacity:1}to{transform:translateX(-120vw) rotate(-25deg);opacity:0}}
@keyframes fly-right{from{transform:translateX(0) rotate(0deg);opacity:1}to{transform:translateX(120vw) rotate(25deg);opacity:0}}
@keyframes enter-from-right{from{transform:translateX(60vw) scale(.9);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}
@keyframes enter-from-left{from{transform:translateX(-60vw) scale(.9);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}
.afl{animation:fly-left .35s ease-in forwards}.afr{animation:fly-right .35s ease-in forwards}
.aer{animation:enter-from-right .35s cubic-bezier(.25,.46,.45,.94) forwards}
.ael{animation:enter-from-left .35s cubic-bezier(.25,.46,.45,.94) forwards}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-title">&#10022; Spellbook &#10022;</div>
    <div id="counter"></div>
  </div>
  <div id="card-stage">
    <div class="card-shadow card-shadow-2"></div>
    <div class="card-shadow card-shadow-1"></div>
    <div id="no-results">No spells match this filter.</div>
  </div>
  <div id="swipe-hint">
    <div class="hint-arrows">
      <div class="hint-arrow">&#8592;</div>
      <div class="hint-arrow">&#8594;</div>
    </div>
    <div class="hint-text">Swipe or drag to browse</div>
  </div>
  <div id="filters">
    <div id="filters-body" class="filters-body">
      <div class="filter-row" id="prepared-filters"></div>
      <div class="filter-row" id="level-filters"></div>
      <div class="filter-row" id="class-filters"></div>
      <div class="filter-row" id="school-filters"></div>
    </div>
    <div class="search-row">
      <input id="search-input" class="search-input" type="text" placeholder="Search spells by name..." aria-label="Search spells by name">
      <button id="filter-toggle" class="arrow-toggle" type="button" aria-expanded="true" aria-controls="filters-body" aria-label="Hide filters"><span class="arrow">&#9660;</span></button>
    </div>
  </div>
</div>
<script src="./spell-data-loader.js"></script>
<script src="./spell-normalize.js"></script>
<script>
var SPELLS = [{"name": "Aid", "level": 2, "school": "A", "time": "1 action", "range": "30 feet", "components": "V, S, M (a tiny strip of white cloth)", "duration": "8 hours", "classes": "Artificer, Cleric, Paladin", "ritual": false, "description": "Your spell bolsters your allies with toughness and resolve. Choose up to three creatures within range. Each target's hit point maximum and current hit points increase by 5 for the duration.", "higherLevels": "When you cast this spell using a spell slot of 3rd level or higher, a target's hit points increase by an additional 5 for each slot level above 2nd."}, {"name": "Animate Dead", "level": 3, "school": "N", "time": "1 minute", "range": "10 feet", "components": "V, S, M (a drop of blood, a piece of flesh, and a pinch of bone dust)", "duration": "Instantaneous", "classes": "Cleric, Cleric (Death), Paladin (Oathbreaker), Wizard", "ritual": false, "description": "This spell creates an undead servant. Choose a pile of bones or a corpse of a Medium or Small humanoid within range. Your spell imbues the target with a foul mimicry of life, raising it as an undead creature. The target becomes a skeleton if you chose bones or a zombie if you chose a corpse (the DM has the creature's game statistics).\n\nOn each of your turns, you can use a bonus action to mentally command any creature you made with this spell if the creature is within 60 feet of you (if you control multiple creatures, you can command any or all of them at the same time, issuing the same command to each one). You decide what action the creature will take and where it will move during its next turn, or you can issue a general command, such as to guard a particular chamber or corridor. If you issue no commands, the creature only defends itself against hostile creatures. Once given an order, the creature continues to follow it until its task is complete.\n\nThe creature is under your control for 24 hours, after which it stops obeying any command you've given it. To maintain the control of the creature for another 24 hours, you must cast this spell on the creature again before the current 24-hour period ends. This use of the spell reasserts your control over up to four creatures you have animated with this spell, rather than animating a new one.", "higherLevels": "When you cast this spell using a spell slot of 4th level or higher, you animate or reassert control over two additional undead creatures for each slot above 3rd. Each of the creatures must come from a different corpse or pile of bones."}, {"name": "Augury", "level": 2, "school": "D", "time": "1 minute", "range": "Self", "components": "V, S, M (specially marked sticks, bones, or similar tokens worth at least 25 gp)", "duration": "Instantaneous", "classes": "Cleric, Cleric (Knowledge)", "ritual": true, "description": "By casting gem-inlaid sticks, rolling dragon bones, laying out ornate cards, or employing some other divining tool, you receive an omen from an otherworldly entity about the results of a specific course of action that you plan to take within the next 30 minutes. The DM chooses from the following possible omens.\n\n\u2022 Weal, for good results\n\n\u2022 Woe, for bad results\n\n\u2022 Weal and woe, for both good and bad results\n\n\u2022 Nothing, for results that aren't especially good or bad\n\nThe spell doesn't take into account any possible circumstances that might change the outcome, such as the casting of additional spells or the loss or gain of a companion.\n\nIf you cast the spell two or more times before completing your next long rest, there is a cumulative 25 percent chance for each casting after the first that you get a random reading. The DM makes this roll in secret.", "higherLevels": ""}, {"name": "Aura of Vitality", "level": 3, "school": "EV", "time": "1 action", "range": "Self (30-foot radius)", "components": "V", "duration": "Concentration, up to 1 minute", "classes": "Paladin, Paladin (Crown)", "ritual": false, "description": "Healing energy radiates from you in an aura with a 30-foot radius. Until the spell ends, the aura moves with you, centered on you. You can use a bonus action to cause one creature in the aura (including you) to regain 2d6 hit points.", "higherLevels": ""}, {"name": "Bane", "level": 1, "school": "EN", "time": "1 action", "range": "30 feet", "components": "V, S, M (a drop of blood)", "duration": "Concentration, up to 1 minute", "classes": "Bard, Cleric, Paladin (Vengeance)", "ritual": false, "description": "Up to three creatures of your choice that you can see within range must make Charisma saving throws. Whenever a target that fails this saving throw makes an attack roll or a saving throw before the spell ends, the target must roll a d4 and subtract the number rolled from the attack roll or saving throw.", "higherLevels": "When you cast this spell using a spell slot of 2nd level or higher, you can target one additional creature for each slot level above 1st."}, {"name": "Beacon of Hope", "level": 3, "school": "A", "time": "1 action", "range": "30 feet", "components": "V, S", "duration": "Concentration, up to 1 minute", "classes": "Cleric, Cleric (Life), Paladin (Devotion)", "ritual": false, "description": "This spell bestows hope and vitality. Choose any number of creatures within range. For the duration, each target has advantage on Wisdom saving throws and death saving throws, and regains the maximum number of hit points possible from any healing.", "higherLevels": ""}, {"name": "Bestow Curse", "level": 3, "school": "N", "time": "1 action", "range": "Touch", "components": "V, S", "duration": "Concentration, up to 1 minute", "classes": "Bard, Cleric, Paladin (Oathbreaker), Wizard", "ritual": false, "description": "You touch a creature, and that creature must succeed on a Wisdom saving throw or become cursed for the duration of the spell. When you cast this spell, choose the nature of the curse from the following options.\n\n\u2022 Choose one ability score. While cursed, the target has disadvantage on ability checks and saving throws made with that ability score.\n\n\u2022 While cursed, the target has disadvantage on attack rolls against you.\n\n\u2022 While cursed, the target must make a Wisdom saving throw at the start of each of its turns. If it fails, it wastes its action that turn doing nothing.\n\n\u2022 While the target is cursed, your attacks and spells deal an extra 1d8 necrotic damage to the target.\n\nA remove curse spell ends this effect. At the DM's option, you may choose an alternative curse effect, but it should be no more powerful than those described above. The DM has final say on such a curse's effect.", "higherLevels": "If you cast this spell using a spell slot of 4th level or higher, the duration is concentration, up to 10 minutes. If you use a spell slot of 5th level or higher, the duration is 8 hours. If you use a spell slot of 7th level or higher, the duration is 24 hours. If you use a 9th level spell slot, the spell lasts until it is dispelled. Using a spell slot of 5th level or higher grants a duration that doesn't require concentration."}, {"name": "Bless", "level": 1, "school": "EN", "time": "1 action", "range": "30 feet", "components": "V, S, M (a sprinkling of holy water)", "duration": "Concentration, up to 1 minute", "classes": "Cleric, Cleric (Life), Paladin", "ritual": false, "description": "You bless up to three creatures of your choice within range. Whenever a target makes an attack roll or a saving throw before the spell ends, the target can roll a d4 and add the number rolled to the attack roll or saving throw.", "higherLevels": "When you cast this spell using a spell slot of 2nd level or higher, you can target one additional creature for each slot level above 1st."}, {"name": "Blindness/Deafness", "level": 2, "school": "N", "time": "1 action", "range": "30 feet", "components": "V", "duration": "1 minute", "classes": "Bard, Cleric, Cleric (Death), Sorcerer, Warlock (Fiend), Warlock (Undying), Wizard", "ritual": false, "description": "You can blind or deafen a foe. Choose one creature that you can see within range to make a Constitution saving throw. If it fails, the target is either blinded or deafened (your choice) for the duration. At the end of each of its turns, the target can make a Constitution saving throw. On a success, the spell ends.", "higherLevels": "When you cast this spell using a spell slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd."}, {"name": "Calm Emotions", "level": 2, "school": "EN", "time": "1 action", "range": "60 feet", "components": "V, S", "duration": "Concentration, up to 1 minute", "classes": "Bard, Cleric, Warlock (Archfey)", "ritual": false, "description": "You attempt to suppress strong emotions in a group of people. Each humanoid in a 20-foot-radius sphere centered on a point you choose within range must make a Charisma saving throw a creature can choose to fail this saving throw if it wishes. If a creature fails its saving throw, choose one of the following two effects.\n\nYou can suppress any effect causing a target to be charmed or frightened. When this spell ends, any suppressed effect resumes, provided that its duration has not expired in the meantime.\n\nAlternatively, you can make a target indifferent about creatures of your choice that it is hostile toward. This indifference ends if the target is attacked or harmed by a spell or if it witnesses any of its friends being harmed. When the spell ends, the creature becomes hostile again, unless the DM rules otherwise.", "higherLevels": ""}, {"name": "Clairvoyance", "level": 3, "school": "D", "time": "10 minutes", "range": "1 mile", "components": "V, S, M (a focus worth at least 100 gp, either a jeweled horn for hearing or a glass eye for scrying)", "duration": "Concentration, up to 10 minutes", "classes": "Bard, Cleric, Sorcerer, Warlock (Great Old One), Wizard", "ritual": false, "description": "You create an invisible sensor within range in a location familiar to you (a place you have visited or seen before) or in an obvious location that is unfamiliar to you (such as behind a door, around a corner, or in a grove of trees). The sensor remains in place for the duration, and it can't be attacked or otherwise interacted with. When you cast the spell, you choose seeing or hearing. You can use the chosen sense through the sensor as if you were in its space. As your action, you can switch between seeing and hearing. A creature that can see the sensor (such as a creature benefiting from see invisibility or truesight) sees a luminous, intangible orb about the size of your fist.", "higherLevels": ""}, {"name": "Command", "level": 1, "school": "EN", "time": "1 action", "range": "60 feet", "components": "V", "duration": "1 round", "classes": "Cleric, Cleric (Knowledge), Paladin, Paladin (Crown), Warlock (Fiend)", "ritual": false, "description": "You speak a one-word command to a creature you can see within range. The target must succeed on a Wisdom saving throw or follow the command on its next turn. The spell has no effect if the target is undead, if it doesn't understand your language, or if your command is directly harmful to it.\n\nSome typical commands and their effects follow. You might issue a command other than one described here. If you do so, the DM determines how the target behaves. If the target can't follow your command, the spell ends.\n\nApproach: The target moves toward you by the shortest and most direct route, ending its turn if it moves within 5 feet of you.\n\nDrop: The target drops whatever it is holding and then ends its turn.\n\nFlee: The target spends its turn moving away from you by the fastest available means.\n\nGrovel: The target falls prone and then ends its turn.\n\nHalt: The target doesn't move and takes no actions. A flying creature stays aloft, provided that it is able to do so. If it must move to stay aloft, it flies the minimum distance needed to remain in the air.", "higherLevels": "When you cast this spell using a spell slot of 2nd level or higher, you can affect one additional creature for each slot level above 1st. The creatures must be within 30 feet of each other when you target them."}, {"name": "Continual Flame", "level": 2, "school": "EV", "time": "1 action", "range": "Touch", "components": "V, S, M (ruby dust worth 50 gp, which the spell consumes)", "duration": "Until dispelled", "classes": "Artificer, Cleric, Wizard, Fighter (Eldritch Knight)", "ritual": false, "description": "A flame, equivalent in brightness to a torch, springs forth from an object that you touch. The effect looks like a regular flame, but it creates no heat and doesn't use oxygen. A continual flame can be covered or hidden but not smothered or quenched.", "higherLevels": ""}, {"name": "Create Food and Water", "level": 3, "school": "C", "time": "1 action", "range": "30 feet", "components": "V, S", "duration": "Instantaneous", "classes": "Cleric, Druid (Desert), Paladin", "ritual": false, "description": "You create 45 pounds of food and 30 gallons of water on the ground or in containers within range, enough to sustain up to fifteen humanoids or five steeds for 24 hours. The food is bland but nourishing, and spoils if uneaten after 24 hours. The water is clean and doesn't go bad.", "higherLevels": ""}, {"name": "Create or Destroy Water", "level": 1, "school": "T", "time": "1 action", "range": "30 feet", "components": "V, S, M (a drop of water if creating water or a few grains of sand if destroying it)", "duration": "Instantaneous", "classes": "Cleric, Druid", "ritual": false, "description": "You either create or destroy water.\n\nCreate Water: You create up to 10 gallons of clean water within range in an open container. Alternatively, the water falls as rain in a 30-foot cube within range, extinguishing exposed flames in the area.\n\nDestroy Water: You destroy up to 10 gallons of water in an open container within range. Alternatively, you destroy fog in a 30-foot cube within range.", "higherLevels": "When you cast this spell using a spell slot of 2nd level or higher, you create or destroy 10 additional gallons of water, or the size of the cube increases by 5 feet, for each slot level above 1st."}, {"name": "Cure Wounds", "level": 1, "school": "EV", "time": "1 action", "range": "Touch", "components": "V, S", "duration": "Instantaneous", "classes": "Artificer, Bard, Cleric, Cleric (Life), Druid, Paladin, Ranger", "ritual": false, "description": "A creature you touch regains a number of hit points equal to 1d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs.", "higherLevels": "When you cast this spell using a spell slot of 2nd level or higher, the healing increases by 1d8 for each slot level above 1st."}, {"name": "Daylight", "level": 3, "school": "EV", "time": "1 action", "range": "60 feet", "components": "V, S", "duration": "1 hour", "classes": "Cleric, Cleric (Light), Druid, Druid (Grassland), Paladin, Ranger, Sorcerer", "ritual": false, "description": "A 60-foot-radius sphere of light spreads out from a point you choose within range. The sphere is bright light and sheds dim light for an additional 60 feet.\n\nIf you chose a point on an object you are holding or one that isn't being worn or carried, the light shines from the object with and moves with it. Completely covering the affected object with an opaque object, such as a bowl or a helm, blocks the light.\n\nIf any of this spell's area overlaps with an area of darkness created by a spell of 2nd level or lower, the spell that created the darkness is dispelled.", "higherLevels": ""}, {"name": "Detect Evil and Good", "level": 1, "school": "D", "time": "1 action", "range": "Self", "components": "V, S", "duration": "Concentration, up to 10 minutes", "classes": "Cleric, Paladin", "ritual": false, "description": "For the duration, you know if there is an aberration, celestial, elemental, fey, fiend, or undead within 30 feet of you, as well as where the creature is located. Similarly, you know if there is a place of object within 30 feet of you that has been magically consecrated or desecrated. The spell can penetrate most barriers, but it is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt.", "higherLevels": ""}, {"name": "Detect Magic", "level": 1, "school": "D", "time": "1 action", "range": "Self", "components": "V, S", "duration": "Concentration, up to 10 minutes", "classes": "Artificer, Bard, Cleric, Cleric (Arcana), Druid, Paladin, Ranger, Sorcerer, Wizard", "ritual": true, "description": "For the duration, you sense the presence of magic within 30 feet of you. If you sense magic in this way, you can use your action to see a faint aura around any visible creature or object in the area that bears magic, and you learn its school of magic, if any.\n\nThe spell can penetrate most barriers, but is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt.", "higherLevels": ""}, {"name": "Detect Poison and Disease", "level": 1, "school": "D", "time": "1 action", "range": "Self", "components": "V, S, M (a yew leaf)", "duration": "Concentration, up to 10 minutes", "classes": "Cleric, Druid, Paladin, Ranger", "ritual": false, "description": "For the duration, you can sense the presence and location of poisons, poisonous creatures, and diseases within 30 feet of you. You also identify the kind of poison, poisonous creature, or disease in each case.\n\nThe spell can penetrate most barriers, but is blocked by 1 foot of stone, 1 inch of common metal, a thin sheet of lead, or 3 feet of wood or dirt.", "higherLevels": ""}, {"name": "Dispel Magic", "level": 3, "school": "A", "time": "1 action", "range": "120 feet", "components": "V, S", "duration": "Instantaneous", "classes": "Artificer, Bard, Cleric, Cleric (Arcana), Cleric (Trickery), Druid, Paladin, Paladin (Devotion), Sorcerer, Warlock, Wizard, Fighter (Eldritch Knight)", "ritual": false, "description": "Choose any creature, object, or magical effect within range. Any spell of 3rd level or lower on the target ends. For each spell of 4th level or higher on the target, make an ability check using your spellcasting ability. The DC equals 10 + the spell's level. On a successful check, the spell ends.", "higherLevels": "When you cast this spell using a spell slot of 4th level or higher, you automatically end the effects of a spell on the target if the spell's level is equal to or less than the level of the spell slot you used."}, {"name": "Enhance Ability", "level": 2, "school": "T", "time": "1 action", "range": "Touch", "components": "V, S, M (fur or a feather from a beast)", "duration": "Concentration, up to 1 hour", "classes": "Artificer, Bard, Cleric, Druid, Sorcerer", "ritual": false, "description": "You touch a creature and bestow upon it a magical enhancement. Choose one of the following effects - the target gains the effect until the spell ends.\n\nBear's Endurance: The target has advantage on Constitution checks. It also gains 2d6 temporary hit points, which are lost when the spell ends.\n\nBull's Strength: The target has advantage on Strength checks, and his or her carrying capacity doubles.\n\nCat's Grace: The target has advantage on Dexterity checks. It also doesn't take damage from falling 20 feet or less if it isn't incapacitated.\n\nEagle's Splendor: The target has advantage on Charisma checks.\n\nFox's Cunning: The target has advantage on Intelligence checks.\n\nOwl's Wisdom: The target has advantage on Wisdom checks.", "higherLevels": "When you cast this spell using a spell slot of 3rd level or higher, you can target one additional creature for each slot level above 2nd."}, {"name": "Faerie Fire", "level": 1, "school": "EV", "time": "1 action", "range": "60 feet", "components": "V", "duration": "Concentration, up to 1 minute", "classes": "Artificer, Bard, Cleric (Light), Druid, Warlock (Archfey)", "ritual": false, "description": "Each object in a 20-foot cube within range is outlined in blue, green, or violet light (your choice). Any creature in the area when the spell is cast is also outlined in light if it fails a Dexterity saving throw. For the duration, objects and affected creatures shed dim light in a 10-foot radius.\n\nAny attack roll against an affected creature or object has advantage if the attacker can see it, and the affected creature or object can't benefit from being invisible.", "higherLevels": ""}, {"name": "Feign Death", "level": 3, "school": "N", "time": "1 action", "range": "Touch", "components": "V, S, M (a pinch of graveyard dirt)", "duration": "1 hour", "classes": "Bard, Cleric, Druid, Warlock (Undying), Wizard", "ritual": true, "description": "You touch a willing creature and put it into a cataleptic state that is indistinguishable from death.\n\nFor the spell's duration, or until you use an action to touch the target and dismiss the spell, the target appears dead to all outward inspection and to spells used to determine the target's status. The target is blinded and incapacitated, and its speed drops to 0. The target has resistance to all damage except psychic damage. If the target is diseased or poisoned when you cast the spell, or becomes diseased or poisoned while under the spell's effect, the disease and poison have no effect until the spell ends.", "higherLevels": ""}, {"name": "Find Traps", "level": 2, "school": "D", "time": "1 action", "range": "120 feet", "components": "V, S", "duration": "Instantaneous", "classes": "Cleric, Druid, Ranger", "ritual": false, "description": "You sense the presence of any trap within range that is within line of sight. A trap, for the purpose of this spell, includes anything that would inflict a sudden or unexpected effect you consider harmful or undesirable, which was specifically intended as such by its creator. Thus, the spell would sense an area affected by the alarm spell, a glyph of warding, or a mechanical pit trap, but it would not reveal a natural weakness in the floor, an unstable ceiling, or a hidden sinkhole.\n\nThis spell merely reveals that a trap is present. You don't learn the location of each trap, but you do learn the general nature of the danger posed by a trap you sense.", "higherLevels": ""}, {"name": "Gentle Repose", "level": 2, "school": "N", "time": "1 action", "range": "Touch", "components": "V, S, M (a pinch of salt and one copper piece placed on each of the corpse's eyes, which must remain there for the duration)", "duration": "10 days", "classes": "Cleric, Wizard", "ritual": true, "description": "You touch a corpse or other remains. For the duration, the target is protected from decay and can't become undead.\n\nThe spell also effectively extends the time limit on raising the target from the dead, since days spent under the influence of this spell don't count against the time limit of spells such as raise dead.", "higherLevels": ""}, {"name": "Glyph of Warding", "level": 3, "school": "A", "time": "1 hour", "range": "Touch", "components": "V, S, M (incense and powdered diamond worth at least 200 gp, which the spell consumes)", "duration": "Until dispelled or triggered", "classes": "Artificer, Bard, Cleric, Wizard, Fighter (Eldritch Knight)", "ritual": false, "description": "When you cast this spell, you inscribe a glyph that harms other creatures, either upon a surface (such as a table or a section of floor or wall) or within an object that can be closed (such as a book, a scroll, or a treasure chest) to conceal the glyph. If you choose a surface, the glyph can cover an area of the surface no larger than 10 feet in diameter. If you choose an object, that object must remain in its place, if the object is moved more than 10 feet from where you cast this spell, the glyph is broken and the spell ends without being triggered.\n\nThe glyph is nearly invisible and requires a successful Intelligence (Investigation) check against your spell save DC to be found.\n\nYou decide what triggers the glyph when you cast the spell. For glyphs inscribed on a surface, the most typical triggers include touching or standing on the glyph, removing another object covering the glyph, approaching within a certain distance of the glyph, or manipulating the object on which the glyph is inscribed. For glyphs inscribed within an object, the most common triggers include opening that object, approaching within a certain distance of the object, or seeing or reading the glyph. Once a glyph is triggered, this spell ends.\n\nWhen you inscribe the glyph, choose explosive runes or a spell glyph.\n\nExplosive Runes: When triggered, the glyph erupts with magical energy in a 20-foot-radius sphere centered on the glyph. The sphere spreads around corners. Each creature in the aura must make a Dexterity saving throw. A creature takes 5d8 acid, cold, fire, lightning, or thunder damage on a failed saving throw (your choice when you create the glyph), or half as much damage on a successful one.\n\nSpell Glyph: You can store a prepared spell of 3rd level or lower in the glyph by casting it as part of creating the glyph. The spell must target a single creature or an area. The spell being stored has no immediate effect when cast in this way. When the glyph is triggered, the stored spell is cast. If the spell has a target, it targets the creature that triggered the glyph. If the spell affects an area, the area is centered on that creature. If the spell summons hostile creatures or creates harmful objects or traps, they appear as close as possible to the intruder and attack it. If the spell requires concentration, it lasts until the end of its full duration.", "higherLevels": "When you cast this spell using a spell slot of 4th level or higher, the damage of an explosive runes glyph increases by 1d8 for each slot level above 3rd. If you create a spell glyph, you can store any spell of up to the same level as the slot you use for the glyph of warding."}, {"name": "Guidance", "level": 0, "school": "D", "time": "1 action", "range": "Touch", "components": "V, S", "duration": "Concentration, up to 1 minute", "classes": "Artificer, Cleric, Druid", "ritual": false, "description": "You touch one willing creature. Once before the spell ends, the target can roll a d4 and add the number rolled to one ability check of its choice. It can roll the die before or after making the ability check. The spell then ends.", "higherLevels": ""}, {"name": "Guiding Bolt", "level": 1, "school": "EV", "time": "1 action", "range": "120 feet", "components": "V, S", "duration": "1 round", "classes": "Cleric", "ritual": false, "description": "A flash of light streaks toward a creature of your choice within range. Make a ranged spell attack against the target. On a hit, the target takes 4d6 radiant damage, and the next attack roll made against this target before the end of your next turn has advantage, thanks to the mystical dim light glittering on the target until then.", "higherLevels": "When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d6 for each slot level above 1st."}, {"name": "Healing Word", "level": 1, "school": "EV", "time": "1 bonus action", "range": "60 feet", "components": "V", "duration": "Instantaneous", "classes": "Bard, Cleric, Druid", "ritual": false, "description": "A creature of your choice that you can see within range regains hit points equal to 1d4 + your spellcasting ability modifier. This spell has no effect on undead or constructs.", "higherLevels": "When you cast this spell using a spell slot of 2nd level or higher, the healing increases by 1d4 for each slot level above 1st."}, {"name": "Hold Person", "level": 2, "school": "EN", "time": "1 action", "range": "60 feet", "components": "V, S, M (a small, straight piece of iron)", "duration": "Concentration, up to 1 minute", "classes": "Bard, Cleric, Druid, Druid (Arctic), Paladin (Vengeance), Sorcerer, Warlock, Wizard, Rogue (Arcane Trickster)", "ritual": false, "description": "Choose a humanoid that you can see within range. The target must succeed on a Wisdom saving throw or be paralyzed for the duration. At the end of each of its turns, the target can make another Wisdom saving throw. On a success, the spell ends on the target.", "higherLevels": "When you cast this spell using a spell slot of 3rd level or higher, you can target on additional humanoid for each slot level above 2nd. The humanoids must be within 30 feet of each other when you target them."}, {"name": "Inflict Wounds", "level": 1, "school": "N", "time": "1 action", "range": "Touch", "components": "V, S", "duration": "Instantaneous", "classes": "Cleric, Paladin (Oathbreaker)", "ritual": false, "description": "Make a melee spell attack against a creature you can reach. On a hit, the target takes 3d10 necrotic damage.", "higherLevels": "When you cast this spell using a spell slot of 2nd level or higher, the damage increases by 1d10 for each slot level above 1st."}, {"name": "Leomund's Tiny Hut", "level": 3, "school": "EV", "time": "1 minute", "range": "Self (10-foot-radius hemisphere)", "components": "V, S, M (a small crystal bead)", "duration": "8 hours", "classes": "Bard, Wizard, Fighter (Eldritch Knight)", "ritual": true, "description": "A 10-foot-radius immobile dome of force springs into existence around and above you and remains stationary for the duration. The spell ends if you leave its area.\n\nNine creatures of Medium size or smaller can fit inside the dome with you. The spell fails if its area includes a larger creature or more than nine creatures. Creatures and objects within the dome when you cast this spell can move through it freely. All other creatures and objects are barred from passing through it. Spells and other magical effects can't extend through the dome or be cast through it. The atmosphere inside the space is comfortable and dry, regardless of the weather outside.\n\nUntil the spell ends, you can command the interior to become dimly lit or dark. The dome is opaque from the outside, of any color you choose, but it is transparent from the inside.", "higherLevels": ""}, {"name": "Lesser Restoration", "level": 2, "school": "A", "time": "1 action", "range": "Touch", "components": "V, S", "duration": "Instantaneous", "classes": "Artificer, Bard, Cleric, Cleric (Life), Druid, Paladin, Paladin (Devotion), Ranger", "ritual": false, "description": "You touch a creature and can end either one disease or one condition afflicting it. The condition can be blinded, deafened, paralyzed, or poisoned.", "higherLevels": ""}, {"name": "Light", "level": 0, "school": "EV", "time": "1 action", "range": "Touch", "components": "V, M (a firefly or phosphorescent moss)", "duration": "1 hour", "classes": "Artificer, Bard, Cleric, Sorcerer, Wizard, Fighter (Eldritch Knight)", "ritual": false, "description": "You touch one object that is no larger than 10 feet in any dimension. Until the spell ends, the object sheds bright light in a 20-foot radius and dim light for an additional 20 feet. The light can be colored as you like. Completely covering the object with something opaque blocks the light. The spell ends if you cast it again or dismiss it as an action.\n\nIf you target an object held or worn by a hostile creature, that creature must succeed on a Dexterity saving throw to avoid the spell.", "higherLevels": ""}, {"name": "Locate Object", "level": 2, "school": "D", "time": "1 action", "range": "Self", "components": "V, S, M (a forked twig)", "duration": "Concentration, up to 10 minutes", "classes": "Bard, Cleric, Druid, Paladin, Ranger, Wizard", "ritual": false, "description": "Describe or name an object that is familiar to you. You sense the direction to the object's location, as long as that object is within 1,000 feet of you. If the object is in motion, you know the direction of its movement.\n\nThe spell can locate a specific object known to you, as long as you have seen it up close - within 30 feet - at least once. Alternatively, the spell can locate the nearest object of a particular kind, such as a certain kind of apparel, jewelry, furniture, tool, or weapon.\n\nThis spell can't locate an object if any thickness of lead, even a thin sheet, blocks a direct path between you and the object.", "higherLevels": ""}, {"name": "Magic Circle", "level": 3, "school": "A", "time": "1 minute", "range": "10 feet", "components": "V, S, M (holy water or powdered silver and iron worth at least 100 gp, which the spell consumes)", "duration": "1 hour", "classes": "Cleric, Cleric (Arcana), Paladin, Warlock, Wizard, Fighter (Eldritch Knight)", "ritual": false, "description": "You create a 10-foot-radius, 20-foot-tall cylinder of magical energy centered on a point on the ground that you can see within range. Glowing runes appear wherever the cylinder intersects with the floor or other surface.\n\nChoose one or more of the following types of creatures - celestials, elementals, fey, fiends, or undead. The circle affects a creature of the chosen type in the following ways.\n\n\u2022 The creature can't willingly enter the cylinder by nonmagical means. If the creature tries to use teleportation or interplanar travel to do so, it must first succeed on a Charisma saving throw.\n\n\u2022 The creature has disadvantage on attack rolls against targets within the cylinder.\n\n\u2022 Targets within the cylinder can't be charmed, frightened, or possessed by the creature.\n\nWhen you cast this spell, you can elect to cause its magic to operate in the reverse direction, preventing a creature of the specified type from leaving the cylinder and protecting targets outside it.", "higherLevels": "When you cast this spell using a spell slot of 4th level or higher, the duration increases by 1 hour for each slot level above 3rd."}, {"name": "Mass Healing Word", "level": 3, "school": "EV", "time": "1 bonus action", "range": "60 feet", "components": "V", "duration": "Instantaneous", "classes": "Cleric", "ritual": false, "description": "As you call out words of restoration, up to six creatures of your choice that you can see within range regain hit points equal to 1d4 + your spellcasting ability modifier. This spell has no effect on undead or constructs.", "higherLevels": "When you cast this spell using a spell slot of 4th level or higher, the healing increases by 1d4 for each slot level above 3rd."}, {"name": "Meld into Stone", "level": 3, "school": "T", "time": "1 action", "range": "Touch", "components": "V, S", "duration": "8 hours", "classes": "Cleric, Druid, Druid (Mountain)", "ritual": true, "description": "You step into a stone object or surface large enough to fully contain your body, melding yourself and all the equipment you carry with the stone for the duration. Using your movement, you step into the stone at a point you can touch. Nothing of your presence remains visible or otherwise detectable by nonmagical senses.\n\nWhile merged with the stone, you can't see what occurs outside it, and any Wisdom (Perception) checks you make to hear sounds outside it are made with disadvantage. You remain aware of the passage of time and can cast spells on yourself while merged in the stone. You can use your movement to leave the stone where you entered it, which ends the spell. You otherwise can't move.\n\nMinor physical damage to the stone doesn't harm you, but its partial destruction or a change in its shape (to the extent that you no longer fit within it) expels you and deals 6d6 bludgeoning damage to you. The stone's complete destruction (or transmutation into a different substance) expels you and deals 50 bludgeoning damage to you. If expelled, you fall prone in an unoccupied space closest to where you first entered.", "higherLevels": ""}, {"name": "Mending", "level": 0, "school": "T", "time": "1 minute", "range": "Touch", "components": "V, S, M (two lodestones)", "duration": "Instantaneous", "classes": "Artificer, Bard, Cleric, Druid, Sorcerer, Wizard", "ritual": false, "description": "This spell repairs a single break or tear in an object you touch, such as broken chain link, two halves of a broken key, a torn clack, or a leaking wineskin. As long as the break or tear is no larger than 1 foot in any dimension, you mend it, leaving no trace of the former damage.\n\nThis spell can physically repair a magic item or construct, but the spell can't restore magic to such an object.", "higherLevels": ""}, {"name": "Moonbeam", "level": 2, "school": "EV", "time": "1 action", "range": "120 feet", "components": "V, S, M (several seeds of any moonseed plant and a piece of opalescent feldspar)", "duration": "Concentration, up to 1 minute", "classes": "Druid, Paladin (Ancients)", "ritual": false, "description": "A silvery beam of pale light shines down in a 5-foot radius, 40-foot-high cylinder centered on a point within range. Until the spell ends, dim light fills the cylinder.\n\nWhen a creature enters the spell's area for the first time on a turn or starts its turn there, it is engulfed in ghostly flames that cause searing pain, and it must make a Constitution saving throw. It takes 2d10 radiant damage on a failed save, or half as much damage on a successful one.\n\nA shapechanger makes its saving throw with disadvantage. If it fails, it also instantly reverts to its original form and can't assume a different form until it leaves the spell's light.\n\nOn each of your turns after you cast this spell, you can use an action to move the beam 60 feet in any direction.", "higherLevels": "When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d10 for each slot level above 2nd."}, {"name": "Prayer of Healing", "level": 2, "school": "EV", "time": "10 minutes", "range": "30 feet", "components": "V", "duration": "Instantaneous", "classes": "Cleric", "ritual": false, "description": "Up to six creatures of your choice that you can see within range each regain hit points equal to 2d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs.", "higherLevels": "When you cast this spell using a spell slot of 3rd level or higher, the healing increases by 1d8 for each slot level above 2nd."}, {"name": "Protection from Energy", "level": 3, "school": "A", "time": "1 action", "range": "Touch", "components": "V, S", "duration": "Concentration, up to 1 hour", "classes": "Artificer, Cleric, Druid, Druid (Desert), Paladin (Ancients), Paladin (Vengeance), Ranger, Sorcerer, Wizard, Fighter (Eldritch Knight)", "ritual": false, "description": "For the duration, the willing creature you touch has resistance to one damage type of your choice - acid, cold, fire, lightning, or thunder.", "higherLevels": ""}, {"name": "Protection from Evil and Good", "level": 1, "school": "A", "time": "1 action", "range": "Touch", "components": "V, S, M (holy water or powdered silver and iron, which the spell consumes)", "duration": "Concentration, up to 10 minutes", "classes": "Cleric, Paladin, Paladin (Devotion), Warlock, Wizard, Fighter (Eldritch Knight)", "ritual": false, "description": "Until the spell ends, one willing creature you touch is protected against certain types of creatures - aberrations, celestials, elementals, fey, fiends, and undead.\n\nThe protection grants several benefits. Creatures of those types have disadvantage on attack rolls against the target. The target also can't be charmed, frightened, or possessed by them. If the target is already charmed, frightened, or possessed by such a creature, the target has advantage on any new saving throw against the relevant effect.", "higherLevels": ""}, {"name": "Protection from Poison", "level": 2, "school": "A", "time": "1 action", "range": "Touch", "components": "V, S", "duration": "1 hour", "classes": "Artificer, Cleric, Druid, Paladin, Ranger", "ritual": false, "description": "You touch a creature. If it is poisoned, you neutralize the poison. If more than one poison afflicts the target, you neutralize on poison that you know is present, or you neutralize one at random.\n\nFor the duration, the target has advantage on saving throws against being poisoned, and it has resistance to poison damage.", "higherLevels": ""}, {"name": "Purify Food and Drink", "level": 1, "school": "T", "time": "1 action", "range": "10 feet", "components": "V, S", "duration": "Instantaneous", "classes": "Cleric, Druid, Paladin", "ritual": true, "description": "All nonmagical food and drink within a 5-foot-radius sphere centered on a point of your choice within range is purified and rendered free of poison and disease.", "higherLevels": ""}, {"name": "Remove Curse", "level": 3, "school": "A", "time": "1 action", "range": "Touch", "components": "V, S", "duration": "Instantaneous", "classes": "Cleric, Paladin, Warlock, Wizard, Fighter (Eldritch Knight)", "ritual": false, "description": "At your touch, all curses affecting one creature or object end. If the object is a cursed magic item, its curse remains, but the spell breaks its owner's attunement to the object so it can be removed or discarded.", "higherLevels": ""}, {"name": "Resistance", "level": 0, "school": "A", "time": "1 action", "range": "Touch", "components": "V, S, M", "duration": "Concentration, up to 1 minute", "classes": "Artificer, Cleric, Druid", "ritual": false, "description": "You touch one willing creature. Once before the spell ends, the target can roll a d4 and add the number rolled to one saving throw of its choice. It can roll the die before or after the saving throw. The spell then ends.", "higherLevels": ""}, {"name": "Revivify", "level": 3, "school": "N", "time": "1 action", "range": "Touch", "components": "V, S, M (diamonds worth 300 gp, which the spell consumes)", "duration": "Instantaneous", "classes": "Artificer, Cleric, Cleric (Life), Paladin", "ritual": false, "description": "You touch a creature that has died within the last minute. That creature returns to life with 1 hit point. This spell can't return to life a creature that has died of old age, nor can it restore any missing body parts.", "higherLevels": ""}, {"name": "Sacred Flame", "level": 0, "school": "EV", "time": "1 action", "range": "60 feet", "components": "V, S", "duration": "Instantaneous", "classes": "Cleric", "ritual": false, "description": "Flame-like radiance descends on a creature that you can see within range. The target must succeed on a Dexterity saving throw or take 1d8 radiant damage. The target gains no benefit from cover for this saving throw.\n\nThe spell's damage increases by 1d8 when you reach 5th level (2d8), 11th level (3d8), and 17th level (4d8).", "higherLevels": ""}, {"name": "Sanctuary", "level": 1, "school": "A", "time": "1 bonus action", "range": "30 feet", "components": "V, S, M (a small silver mirror)", "duration": "1 minute", "classes": "Artificer, Cleric, Paladin (Devotion)", "ritual": false, "description": "You ward a creature within range against attack. Until the spell ends, any creature who targets the warded creature with an attack or a harmful spell must first make a Wisdom saving throw. On a failed save, the creature must choose a new target or lose the attack or spell. This spell doesn't protect the warded creature from area effects, such as the explosion of a fireball.\n\nIf the warded creature makes an attack or casts a spell that affects an enemy creature, this spell ends.", "higherLevels": ""}, {"name": "See Invisibility", "level": 2, "school": "D", "time": "1 action", "range": "Self", "components": "V, S, M (A pinch of Talc and a small sprinkling of powdered silver)", "duration": "1 hour", "classes": "Artificer, Bard, Sorcerer, Wizard", "ritual": false, "description": "For the duration, you see invisible creatures and objects as if they were visible, and you can see into the Ethereal Plane. Ethereal creatures and objects appear ghostly and translucent.", "higherLevels": ""}, {"name": "Sending", "level": 3, "school": "EV", "time": "1 action", "range": "Unlimited", "components": "V, S, M (A short piece of fine copper wire)", "duration": "1 round", "classes": "Cleric, Warlock (Great Old One), Wizard, Fighter (Eldritch Knight)", "ritual": false, "description": "You send a short message of twenty-five words or less to a creature with you are familiar. The creature hears the message in its mind, recognizes you as the sender if it knows you, and can answer in a like manner immediately. The spell enables creatures with Intelligence scores of at least 1 to understand the meaning of your message.\n\nYou can send the message across any distance and even to other planes of existence, but if the target is on a different plane than you, there is a 5 percent chance that the message doesn't arrive.", "higherLevels": ""}, {"name": "Shield of Faith", "level": 1, "school": "A", "time": "1 bonus action", "range": "60 feet", "components": "V, S, M (a small parchment with a bit of holy text written on it)", "duration": "Concentration, up to 10 minutes", "classes": "Cleric, Cleric (War), Paladin", "ritual": false, "description": "A shimmering field appears and surrounds a creature of your choice within range, granting it a +2 bonus to AC for the duration.", "higherLevels": ""}, {"name": "Silence", "level": 2, "school": "I", "time": "1 action", "range": "120 feet", "components": "V, S", "duration": "Concentration, up to 10 minutes", "classes": "Bard, Cleric, Druid (Desert), Ranger, Warlock (Undying)", "ritual": true, "description": "For the duration, no sound can be created within or pass through a 20-foot-radius sphere centered on a point you choose within range. Any creature or object entirely inside the sphere is immune to thunder damage, and creatures are deafened while entirely inside it. Casting a spell that includes a verbal component is impossible there.", "higherLevels": ""}, {"name": "Sleep", "level": 1, "school": "EN", "time": "1 action", "range": "90 feet", "components": "V, S, M (a pinch of find sand, rose petals, or a cricket)", "duration": "1 minute", "classes": "Bard, Sorcerer, Warlock (Archfey), Wizard, Rogue (Arcane Trickster)", "ritual": false, "description": "This spell sends creatures into a magical slumber. Roll 5d8, the total is how many hit points of creatures this spell can affect. Creatures within 20 feet of a point you choose within range are affected in ascending order of their current hit points (ignoring unconscious creatures).\n\nStarting with the creature that has the lowest current hit points, each creature affected by this spell falls unconscious until the spell ends, the sleeper takes damage, or someone uses an action to shake or slap the sleeper awake. Subtract each creature's hit points from the total before moving on to the creature with the next lowest hit points. A creature's hit points must be equal to or less than the remaining total for that creature to be affected.\n\nUndead and creatures immune to being charmed aren't affected by this spell.", "higherLevels": "When you cast this spell using a spell slot of 2nd level or higher, roll an additional 2d8 for each slot level above 1st."}, {"name": "Spare the Dying", "level": 0, "school": "N", "time": "1 action", "range": "Touch", "components": "V, S", "duration": "Instantaneous", "classes": "Artificer, Cleric", "ritual": false, "description": "You touch a living creature that has 0 hit points. The creature becomes stable. This spell has no effect on undead or constructs.", "higherLevels": ""}, {"name": "Speak with Dead", "level": 3, "school": "N", "time": "1 action", "range": "10 feet", "components": "V, S, M (burning incense)", "duration": "10 minutes", "classes": "Bard, Cleric, Cleric (Knowledge), Warlock (Undying)", "ritual": false, "description": "You grant the semblance of life and intelligence to a corpse of your choice within range, allowing it to answer the questions you pose. The corpse must still have a mouth and can't be undead. The spell fails if the corpse was the target of this spell within the last 10 days.\n\nUntil the spell ends, you can ask the corpse up to five questions. The corpse knows only what it knew in life, including the languages it knew. Answers are usually brief, cryptic, or repetitive, and the corpse is under no compulsion to offer a truthful answer if you are hostile to it or it recognizes you as an enemy. This spell doesn't return the creature's soul to its body, only its animating spirit. Thus, the corpse can't learn new information, doesn't comprehend anything that has happened since it died, and can't speculate about future events.", "higherLevels": ""}, {"name": "Spirit Guardians", "level": 3, "school": "C", "time": "1 action", "range": "Self (15-foot-radius)", "components": "V, S, M (a holy symbol)", "duration": "Concentration, up to 10 minutes", "classes": "Cleric, Cleric (War), Paladin (Crown)", "ritual": false, "description": "You call forth spirits to protect you. They flit around you to a distance of 15 feet for the duration. If you are good or neutral, their spectral form appears angelic or fey (your choice). If you are evil, they appear fiendish.\n\nWhen you cast this spell, you can designate any number of creatures you can see to be unaffected by it. An affected creature's speed is halved in the area, and when the creature enters the area for the first time on a turn or starts its turn there, it must make a Wisdom saving throw. On a failed save, the creature takes 3d8 radiant damage (if you are good or neutral) or 3d8 necrotic damage (if you are evil). On a successful save, the creature takes half as much damage.", "higherLevels": "When you cast this spell using a spell slot of 4th level or higher, the damage increases by 1d8 for each slot level above 3rd."}, {"name": "Spiritual Weapon", "level": 2, "school": "EV", "time": "1 bonus action", "range": "60 feet", "components": "V, S", "duration": "1 minute", "classes": "Cleric, Cleric (Life), Cleric (War)", "ritual": false, "description": "You create a floating, spectral weapon within range that lasts for the duration or until you cast this spell again. When you cast the spell, you can make a melee spell attack against a creature within 5 feet of the weapon. On a hit, the target takes force damage equal to 1d8 + your spellcasting ability modifier.\n\nAs a bonus action on your turn, you can move the weapon up to 20 feet and repeat the attack against a creature within 5 feet of it.\n\nThe weapon can take whatever form you choose. Clerics of deities who are associated with a particular weapon (as St. Cuthbert is known for his mace and Thor for his hammer) make this spell's effect resemble that weapon.", "higherLevels": "When you cast this spell using a spell slot of 3rd level or higher, the damage increases by 1d8 for every two slot levels above the 2nd."}, {"name": "Thaumaturgy", "level": 0, "school": "T", "time": "1 action", "range": "30 feet", "components": "V", "duration": "Up to 1 minute", "classes": "Cleric", "ritual": false, "description": "You manifest a minor wonder, a sign of supernatural power, within range. You create one of the following magical effects within range.\n\n\u2022 Your voice booms up to three times as loud as normal for 1 minute.\n\n\u2022 You cause flames to flicker, brighten, dim, or change color for 1 minute.\n\n\u2022 You cause harmless tremors in the ground for 1 minute.\n\n\u2022 You create an instantaneous sound that originates from a point of your choice within range, such as a rumble of thunder, the cry of a raven, or ominous whispers.\n\n\u2022 You instantaneously cause an unlocked door or window to fly open or slam shut.\n\n\u2022 You alter the appearance of your eyes for 1 minute.\n\nIf you cast this spell multiple times, you can have up to three of its 1-minute effects active at a time, and you can dismiss such an effect as an action.", "higherLevels": ""}, {"name": "Tongues", "level": 3, "school": "D", "time": "1 action", "range": "Touch", "components": "V, M (a small clay model of a ziggurat)", "duration": "1 hour", "classes": "Bard, Cleric, Sorcerer, Warlock, Wizard", "ritual": false, "description": "This spell grants the creature you touch the ability to understand any spoken language it hears. Moreover, when the target speaks, any creature that knows at least one language and can hear the target understands what it says.", "higherLevels": ""}, {"name": "Warding Bond", "level": 2, "school": "A", "time": "1 action", "range": "Touch", "components": "V, S, M (a pair of platinum rings worth at least 50 gp each, which you and target must wear for the duration)", "duration": "1 hour", "classes": "Cleric, Paladin (Crown)", "ritual": false, "description": "This spell wards a willing creature you touch and creates a mystic connection between you and the target until the spell ends. While the target is within 60 feet of you, it gains a +1 bonus to AC and saving throws, and it has resistance to all damage. Also, each time it takes damage, you take the same amount of damage.\n\nThe spell ends if you drop to 0 hit points or if you and the target become separated by more than 60 feet. It also ends if the spell is cast again on either of the connected creatures. You can also dismiss the spell as an action.", "higherLevels": ""}, {"name": "Water Walk", "level": 3, "school": "T", "time": "1 action", "range": "30 feet", "components": "V, S, M (a piece of cork)", "duration": "1 hour", "classes": "Artificer, Cleric, Druid, Druid (Coast), Druid (Swamp), Ranger, Sorcerer", "ritual": true, "description": "This spell grants the ability to move across any liquid surface - such as water, acid, mud, snow, quicksand, or lava - as if it were harmless solid ground (creatures crossing molten lava can still take damage from the heat). Up to ten willing creatures you can see within range gain this ability for the duration.\n\nIf your target a creature submerged in a liquid, the spell carries the target to the surface of the liquid at a rate of 60 feet per round.", "higherLevels": ""}, {"name": "Zone of Truth", "level": 2, "school": "EN", "time": "1 action", "range": "60 feet", "components": "V, S, M", "duration": "10 minutes", "classes": "Bard, Cleric, Paladin, Paladin (Devotion), Paladin (Crown)", "ritual": false, "description": "You create a magical zone that guards against deception in a 15-foot-radius sphere centered on a point of your choice within range. Until the spell ends, a creature that enters the spell's area for the first time on a turn or starts its turn there must make a Charisma saving throw. On a failed save, a creature can't speak a deliberate lie while in the radius. You know whether each creature succeeds or fails on its saving throw.\n\nAn affected creature is aware of the spell and can thus avoid answering questions to which it would normally respond with a lie. Such creatures can be evasive in its answers as long as it remains within the boundaries of the truth.", "higherLevels": ""}];
