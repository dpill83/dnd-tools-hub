0,0.3)' stroke-width='1.2'/><circle cx='100' cy='60' r='12' fill='rgba(80,60,140,0.2)' stroke='rgba(140,120,220,0.4)' stroke-width='1.5'/><line x1='58' y1='60' x2='142' y2='60' stroke='rgba(140,120,220,0.2)' stroke-width='0.8'/><line x1='100' y1='18' x2='100' y2='102' stroke='rgba(140,120,220,0.2)' stroke-width='0.8'/>","T":"<path d='M60,28 L100,14 L140,28 L156,70 L140,104 L100,118 L60,104 L44,70 Z' fill='none' stroke='rgba(210,175,60,0.5)' stroke-width='2'/><path d='M74,38 L100,28 L126,38 L138,70 L126,98 L100,108 L74,98 L62,70 Z' fill='rgba(200,170,60,0.08)' stroke='rgba(210,175,60,0.3)' stroke-width='1.2'/>"};var inner=m[sc]||m["A"];return "<svg viewBox='0 0 200 120' xmlns='http://www.w3.org/2000/svg'><rect width='200' height='120' fill='"+c+"' opacity='0.9'/>"+inner+"</svg>";}

var allSpells=[],filteredSpells=[],currentIndex=0,activeLevel="all",activeSchool="all",activeClass="all",preparedFilter="all",searchQuery="",hintHidden=false;
var PREPARED_STORAGE_KEY="spellcards-prepared-v1";
var FILTER_TRAY_STORAGE_KEY="spellcards-filter-tray-collapsed-v1";
var preparedSpells=loadPrepared();

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function normalizeClassName(c){return c.replace(/\s*\(.*?\)\s*/g,"").trim();}
function getSpellClasses(spell){return (spell.classes||"").split(",").map(function(c){return normalizeClassName(c.trim());}).filter(Boolean);}
function isPrepared(name){return !!preparedSpells[name];}
function loadPrepared(){try{var raw=localStorage.getItem(PREPARED_STORAGE_KEY);var obj=raw?JSON.parse(raw):{};return obj&&typeof obj==="object"?obj:{};}catch(e){return {};}}
function savePrepared(){try{localStorage.setItem(PREPARED_STORAGE_KEY,JSON.stringify(preparedSpells));}catch(e){}}
function togglePrepared(name){if(preparedSpells[name])delete preparedSpells[name];else preparedSpells[name]=true;savePrepared();applyFilter(name);}
function isFilterTrayCollapsed(){try{return localStorage.getItem(FILTER_TRAY_STORAGE_KEY)==="1";}catch(e){return false;}}
function setFilterTrayCollapsed(collapsed){try{localStorage.setItem(FILTER_TRAY_STORAGE_KEY,collapsed?"1":"0");}catch(e){}}
function toggleFilterTray(){
  var tray=document.getElementById("filters");
  if(!tray)return;
  var collapsed=!tray.classList.contains("collapsed");
  updateFilterToggleUI(collapsed);
  setFilterTrayCollapsed(collapsed);
}
function updateFilterToggleUI(collapsed){
  var tray=document.getElementById("filters"),btn=document.getElementById("filter-toggle"),body=document.getElementById("filters-body");
  if(!tray||!btn||!body)return;
  tray.classList.toggle("collapsed",collapsed);
  btn.setAttribute("aria-expanded",collapsed?"false":"true");
  btn.setAttribute("aria-label",collapsed?"Show filters":"Hide filters");
  body.setAttribute("aria-hidden",collapsed?"true":"false");
}
function setupFilterTrayToggle(){
  var btn=document.getElementById("filter-toggle");
  if(!btn)return;
  var collapsed=isFilterTrayCollapsed();
  updateFilterToggleUI(collapsed);
  btn.addEventListener("click",function(e){
    e.stopPropagation();
    toggleFilterTray();
  });
}

function buildCard(spell){
  var school=SCHOOL_MAP[spell.school]||{name:spell.school,color:"#3a2a1a"};
  var svg=makeSVG(spell.school,school.color);
  var isConc=spell.duration&&spell.duration.toLowerCase().indexOf("concentration")===0;
  var durDisplay=isConc?spell.duration.replace(/concentration,?\s*/i,"").trim():spell.duration;
  var concDot=isConc?"<span style='color:#7a1a4a;margin-right:2px'>&#9711;</span>":"";
  var levelDisplay=spell.level===0?"C":String(spell.level);
  var compShort=spell.components?spell.components.split("(")[0].trim():"";
  var cornerSVG="<svg viewBox='0 0 20 20' width='18' height='18'><path d='M2,18 L2,2 L18,2' stroke='#c9a84c' stroke-width='1.5' fill='none'/><circle cx='2' cy='2' r='2' fill='#c9a84c'/></svg>";
  var descHTML=spell.description.split("\n\n").map(function(p){return "<p class='desc-para'>"+esc(p)+"</p>";}).join("");
  var higherHTML=spell.higherLevels?"<div class='higher-levels'><span class='higher-levels-label'>At Higher Levels</span>"+esc(spell.higherLevels)+"</div>":"";
  var card=document.createElement("div");
  card.className="card";
  card.innerHTML="<div class='card-inner'><div class='card-art'><div class='card-art-overlay'>"+svg+"</div><div class='art-grad'></div><div class='level-badge'><span class='level-number'>"+levelDisplay+"</span><span class='level-label'>"+(spell.level===0?"cantrip":"level")+"</span></div><button class='prepare-btn"+(isPrepared(spell.name)?" active":"")+"' type='button' aria-label='Toggle prepared for "+esc(spell.name)+"'>"+(isPrepared(spell.name)?"Prepared":"Prepare")+"</button>"+(spell.ritual?"<div class='ritual-tag'>Ritual</div>":"")+"<div class='school-tag'>"+esc(school.name)+"</div><div class='swipe-indicator swipe-left-indicator'>Prev</div><div class='swipe-indicator swipe-right-indicator'>Next</div></div><div class='card-body'><div class='corner corner-tl'>"+cornerSVG+"</div><div class='corner corner-tr'>"+cornerSVG+"</div><div class='corner corner-bl'>"+cornerSVG+"</div><div class='corner corner-br'>"+cornerSVG+"</div><div class='card-name'>"+esc(spell.name)+"<div class='card-name-deco'>&#10022; &#10022; &#10022;</div></div><div class='card-stats'><div class='stat'><span class='stat-label'>Cast Time</span><span class='stat-value'>"+esc(spell.time)+"</span></div><div class='stat'><span class='stat-label'>Range</span><span class='stat-value'>"+esc(spell.range)+"</span></div><div class='stat'><span class='stat-label'>Duration</span><span class='stat-value'>"+concDot+esc(durDisplay)+"</span></div><div class='stat'><span class='stat-label'>Components</span><span class='stat-value'>"+esc(compShort)+"</span></div></div><div class='card-classes'>"+esc(spell.classes)+"</div><div class='card-description'><div class='description-text'>"+descHTML+higherHTML+"</div></div></div></div>";
  var prepBtn=card.querySelector(".prepare-btn");
  if(prepBtn){
    prepBtn.addEventListener("mousedown",function(e){e.stopPropagation();});
    prepBtn.addEventListener("touchstart",function(e){e.stopPropagation();},{passive:true});
    prepBtn.addEventListener("click",function(e){e.stopPropagation();togglePrepared(spell.name);});
  }
  return card;
}

function resetStageMotion(){var stage=document.getElementById("card-stage");stage.style.transform="";var s1=stage.querySelector(".card-shadow-1"),s2=stage.querySelector(".card-shadow-2");if(s1)s1.style.transform="translateY(6px) scale(.97)";if(s2)s2.style.transform="translateY(12px) scale(.94)";}

function applyStageMotion(dx){var stage=document.getElementById("card-stage");var max=window.innerWidth*0.28||1;var ratio=Math.max(-1,Math.min(1,dx/max));stage.style.transform="translateX("+(ratio*4)+"px)";var s1=stage.querySelector(".card-shadow-1"),s2=stage.querySelector(".card-shadow-2");if(s1)s1.style.transform="translate("+(ratio*2)+"px,6px) scale(.97)";if(s2)s2.style.transform="translate("+(ratio*4)+"px,12px) scale(.94)";}

function showCard(index,dir){var stage=document.getElementById("card-stage");var ex=stage.querySelector(".card");if(ex)ex.remove();resetStageMotion();if(!filteredSpells.length){document.getElementById("no-results").style.display="flex";updateCounter();return;}document.getElementById("no-results").style.display="none";var card=buildCard(filteredSpells[index]);if(dir==="right"){card.classList.add("aer");card.addEventListener("animationend",function(){card.classList.remove("aer");},{once:true});}else if(dir==="left"){card.classList.add("ael");card.addEventListener("animationend",function(){card.classList.remove("ael");},{once:true});}stage.appendChild(card);setupTouch(card);updateCounter();}

function updateCounter(){var preparedCount=Object.keys(preparedSpells).length;document.getElementById("counter").textContent=filteredSpells.length?(currentIndex+1)+" / "+filteredSpells.length+"  |  Prepared: "+preparedCount:"";}

function navigateNext(){var card=document.getElementById("card-stage").querySelector(".card");if(!card||!filteredSpells.length)return;card.style.transition="none";card.style.willChange="transform,opacity";card.classList.add("afl");card.addEventListener("animationend",function(){currentIndex=(currentIndex+1)%filteredSpells.length;showCard(currentIndex,"right");},{once:true});}

function navigatePrev(){var card=document.getElementById("card-stage").querySelector(".card");if(!card||!filteredSpells.length)return;card.style.transition="none";card.style.willChange="transform,opacity";card.classList.add("afr");card.addEventListener("animationend",function(){currentIndex=(currentIndex-1+filteredSpells.length)%filteredSpells.length;showCard(currentIndex,"left");},{once:true});}

function setupTouch(card){var startX=0,startY=0,dragX=0,dragging=false,scrolling=false,moved=false;function begin(x,y){startX=x;startY=y;dragging=false;scrolling=false;moved=false;dragX=0;}function move(x,y,prevent){var dx=x-startX,dy=y-startY;if(!moved){moved=true;scrolling=Math.abs(dy)>Math.abs(dx);}if(scrolling)return;if(prevent)prevent();dragging=true;dragX=dx;card.style.transform="translateX("+dragX+"px) rotate("+(dragX*0.05)+"deg)";card.style.transition="none";applyStageMotion(dragX);var li=card.querySelector(".swipe-left-indicator"),ri=card.querySelector(".swipe-right-indicator");if(dragX<-30){li.style.opacity=Math.min(1,Math.abs(dragX)/100);ri.style.opacity=0;}else if(dragX>30){ri.style.opacity=Math.min(1,dragX/100);li.style.opacity=0;}else{li.style.opacity=0;ri.style.opacity=0;}hideHint();}function fling(dir){var offX=dir==="next"?-120:120;card.style.transition="transform .22s ease-out, opacity .22s ease-out";card.style.transform="translateX("+offX+"vw) rotate("+(dir==="next"?-22:22)+"deg)";card.style.opacity="0";card.addEventListener("transitionend",function(){if(dir==="next")currentIndex=(currentIndex+1)%filteredSpells.length;else currentIndex=(currentIndex-1+filteredSpells.length)%filteredSpells.length;showCard(currentIndex,dir==="next"?"right":"left");},{once:true});}function end(){if(!dragging)return;card.querySelector(".swipe-left-indicator").style.opacity=0;card.querySelector(".swipe-right-indicator").style.opacity=0;var threshold=window.innerWidth*0.28;if(dragX<-threshold)fling("next");else if(dragX>threshold)fling("prev");else{card.style.transform="";card.style.transition="transform .35s cubic-bezier(.25,.46,.45,.94)";resetStageMotion();}dragging=false;}card.addEventListener("touchstart",function(e){begin(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});card.addEventListener("touchmove",function(e){move(e.touches[0].clientX,e.touches[0].clientY,function(){e.preventDefault();});},{passive:false});card.addEventListener("touchend",function(){end();},{passive:true});card.addEventListener("mousedown",function(e){begin(e.clientX,e.clientY);});card.addEventListener("mousemove",function(e){if(!moved&&!dragging&&dragX===0)return;move(e.clientX,e.clientY,function(){e.preventDefault();});});card.addEventListener("mouseup",function(){end();});card.addEventListener("mouseleave",function(){end();});}

function setupKeyboard(){document.addEventListener("keydown",function(e){var t=e.target;var isTyping=t&&(t.tagName==="INPUT"||t.tagName==="TEXTAREA"||t.isContentEditable);if(isTyping)return;if(e.key==="ArrowRight"){hideHint();navigateNext();}if(e.key==="ArrowLeft"){hideHint();navigatePrev();}if(e.key==="f"||e.key==="F"){toggleFilterTray();}});}

function hideHint(){if(!hintHidden){hintHidden=true;var h=document.getElementById("swipe-hint");h.classList.add("hidden");setTimeout(function(){if(h.parentNode)h.parentNode.removeChild(h);},700);}}

function applyFilter(preserveSpellName){var q=searchQuery.trim().toLowerCase();filteredSpells=allSpells.filter(function(s){var lm=activeLevel==="all"||s.level===parseInt(activeLevel);var sm=activeSchool==="all"||s.school===activeSchool;var cm=activeClass==="all"||getSpellClasses(s).indexOf(activeClass)!==-1;var pm=preparedFilter==="all"||isPrepared(s.name);var qm=!q||s.name.toLowerCase().indexOf(q)!==-1;return lm&&sm&&cm&&pm&&qm;});if(preserveSpellName){var preservedIndex=filteredSpells.findIndex(function(s){return s.name===preserveSpellName;});currentIndex=preservedIndex!==-1?preservedIndex:0;}else currentIndex=0;showCard(currentIndex,null);}

function buildFilters(){var levelsSeen={},schoolsSeen={},classesSeen={},levels=["all"],schools=["all"],classes=["all"];allSpells.forEach(function(s){if(!levelsSeen[s.level]){levelsSeen[s.level]=true;levels.push(s.level);}if(!schoolsSeen[s.school]){schoolsSeen[s.school]=true;schools.push(s.school);}getSpellClasses(s).forEach(function(c){if(!classesSeen[c]){classesSeen[c]=true;classes.push(c);}});});levels.sort(function(a,b){if(a==="all")return -1;if(b==="all")return 1;return a-b;});classes.sort(function(a,b){if(a==="all")return -1;if(b==="all")return 1;return a.localeCompare(b);});
  var prepRow=document.getElementById("prepared-filters");
  [{id:"all",label:"All Spells"},{id:"prepared",label:"Prepared Only"}].forEach(function(opt){var btn=document.createElement("button");btn.className="filter-btn"+(opt.id==="all"?" active":"");btn.textContent=opt.label;btn.onclick=function(){prepRow.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active");});btn.classList.add("active");preparedFilter=opt.id;applyFilter();};prepRow.appendChild(btn);});
  var lr=document.getElementById("level-filters");levels.forEach(function(l){var btn=document.createElement("button");btn.className="filter-btn"+(l==="all"?" active":"");btn.textContent=l==="all"?"All Levels":(l===0?"Cantrip":"Lvl "+l);btn.onclick=function(){lr.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active");});btn.classList.add("active");activeLevel=l==="all"?"all":l;applyFilter();};lr.appendChild(btn);});
  var cr=document.getElementById("class-filters");classes.forEach(function(c){var btn=document.createElement("button");btn.className="filter-btn"+(c==="all"?" active":"");btn.textContent=c==="all"?"All Classes":c;btn.onclick=function(){cr.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active");});btn.classList.add("active");activeClass=c;applyFilter();};cr.appendChild(btn);});
  var sr=document.getElementById("school-filters");schools.forEach(function(sc){var btn=document.createElement("button");btn.className="filter-btn"+(sc==="all"?" active":"");btn.textContent=sc==="all"?"All Schools":((SCHOOL_MAP[sc]&&SCHOOL_MAP[sc].name)||sc);btn.onclick=function(){sr.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active");});btn.classList.add("active");activeSchool=sc;applyFilter();};sr.appendChild(btn);});
}

function setupSearch(){var input=document.getElementById("search-input");if(!input)return;input.addEventListener("input",function(){searchQuery=input.value||"";applyFilter();});}

function showLoadError(message){
  var noResults=document.getElementById("no-results");
  if(noResults){noResults.textContent=message||"Failed to load spells.";noResults.style.display="flex";}
  var counter=document.getElementById("counter");
  if(counter)counter.textContent="";
}

function initApp(){
  setupFilterTrayToggle();
  setupKeyboard();
  setupSearch();
  if(!window.SpellDataLoader||!window.SpellNormalize){
    showLoadError("Spell modules failed to load.");
    return;
  }
  window.SpellDataLoader.loadAllRawSpells()
    .then(function(raw){return window.SpellNormalize.normalizeSpells(raw);})
    .then(function(normalized){
      allSpells=normalized||[];
      buildFilters();
      filteredSpells=allSpells.slice();
      showCard(0,null);
    })
    .catch(function(err){
      console.error(err);
      showLoadError("Failed to load spells.");
    });
}

initApp();
</script>
</body>
</html>
