<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/loot-card-modal.css">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #f0d070;
  --gold-glow: rgba(201,168,76,0.6);
  --common: #9aa0a6;
  --uncommon: #4fc3f7;
  --rare: #b39ddb;
  --very-rare: #ff8a65;
  --legendary: #ffd54f;
  --legendary-glow: rgba(255,213,79,0.8);
  --font-sans: 'Crimson Text', Georgia, serif;
  --color-text-primary: rgba(240,208,112,0.95);
  --color-text-secondary: rgba(201,168,76,0.75);
  --color-background-primary: rgba(26,14,8,0.95);
  --color-background-secondary: rgba(0,0,0,0.4);
  --color-border-primary: rgba(201,168,76,0.4);
  --color-border-secondary: rgba(201,168,76,0.25);
  --color-border-tertiary: rgba(201,168,76,0.15);
  --border-radius-md: 6px;
  --border-radius-lg: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: #050300; min-height: 100vh; color: var(--color-text-primary); }
#page-wrap { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; padding: 1rem; }
.dm-wrap { padding: 1.5rem 0; max-width: 860px; margin: 0 auto; }
.dm-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--color-border-tertiary); }
.dm-title { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 600; letter-spacing: 0.04em; color: var(--gold-light); }
.dm-key-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.dm-key-pill { font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 4px 10px; }
.dm-key-input { display: none; }
.dm-key-input.visible { display: flex; align-items: center; gap: 8px; }
.dm-key-input input { font-size: 14px; padding: 6px 10px; border-radius: var(--border-radius-md); border: 1px solid var(--color-border-secondary); background: rgba(26,14,8,0.9); color: var(--color-text-primary); width: 200px; }
.dm-key-input input:focus { outline: none; border-color: var(--gold); }
.tab-bar { display: flex; gap: 4px; margin-bottom: 1.5rem; }
.tab { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 0.03em; padding: 6px 14px; border-radius: var(--border-radius-md); border: 1px solid transparent; cursor: pointer; color: var(--color-text-secondary); background: transparent; }
.tab:hover { color: var(--color-text-primary); }
.tab.active { background: var(--color-background-secondary); border-color: var(--color-border-secondary); color: var(--gold-light); font-weight: 600; }
.section { display: none; }
.section.visible { display: block; }
.pack-grid { display: flex; flex-direction: column; gap: 10px; }
.pack-card { background: var(--color-background-secondary); border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; }
.pack-card:hover { border-color: var(--color-border-secondary); }
.pack-label { font-size: 15px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 4px; }
.pack-meta { font-size: 12px; color: var(--color-text-secondary); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.badge-shared { background: rgba(79,195,247,0.2); color: var(--uncommon); border: 1px solid rgba(79,195,247,0.35); }
.badge-personal { background: rgba(179,157,219,0.2); color: var(--rare); border: 1px solid rgba(179,157,219,0.35); }
.badge-active { background: rgba(29,158,117,0.25); color: #7dd3a8; border: 1px solid rgba(29,158,117,0.4); }
.badge-exhausted { background: rgba(154,160,166,0.2); color: var(--common); border: 1px solid rgba(154,160,166,0.3); }
.pack-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.btn-sm { font-size: 12px; padding: 4px 10px; border-radius: var(--border-radius-md); border: 1px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; font-family: var(--font-sans); }
.btn-sm:hover { background: var(--color-background-primary); color: var(--color-text-primary); border-color: var(--gold); }
.btn-primary { font-size: 13px; padding: 7px 16px; border-radius: var(--border-radius-md); border: 1px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; font-weight: 600; font-family: 'Cinzel', serif; }
.btn-primary:hover { background: var(--color-background-primary); border-color: var(--gold); }
.progress-bar-wrap { background: var(--color-background-primary); border-radius: 4px; height: 4px; width: 80px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 4px; background: #1D9E75; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group.hidden { display: none; }
.form-label { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; letter-spacing: 0.02em; }
.form-group input, .form-group select { font-size: 14px; padding: 8px 10px; border-radius: var(--border-radius-md); border: 1px solid var(--color-border-secondary); background: rgba(26,14,8,0.9); color: var(--color-text-primary); width: 100%; font-family: var(--font-sans); }
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold-glow); }
.radio-group { display: flex; gap: 8px; }
.radio-pill { font-size: 13px; padding: 6px 14px; border-radius: var(--border-radius-md); border: 1px solid var(--color-border-secondary); cursor: pointer; color: var(--color-text-secondary); background: transparent; }
.radio-pill:hover { color: var(--color-text-primary); }
.radio-pill.selected { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--gold); font-weight: 500; }
.cat-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-chip { font-size: 12px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
.cat-chip:hover { color: var(--color-text-primary); }
.cat-chip.on { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--gold); }
.slider-row { display: flex; align-items: center; gap: 10px; }
.slider-row input[type=range] { flex: 1; accent-color: var(--gold); }
.slider-val { font-size: 14px; font-weight: 500; min-width: 20px; color: var(--color-text-primary); }
.tier-suggest { font-size: 12px; color: #7dd3a8; background: rgba(29,158,117,0.2); border: 1px solid rgba(29,158,117,0.35); padding: 4px 10px; border-radius: var(--border-radius-md); display: inline-block; margin-top: 4px; }
.search-result { background: var(--color-background-primary); border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-md); margin-top: 4px; overflow: hidden; max-height: 200px; overflow-y: auto; }
.search-item { font-size: 13px; padding: 8px 12px; color: var(--color-text-primary); border-bottom: 1px solid var(--color-border-tertiary); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.search-item:last-child { border-bottom: none; }
.search-item:hover { background: var(--color-background-secondary); }
.search-rarity { font-size: 11px; color: var(--color-text-secondary); }
.form-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--color-border-tertiary); }
.result-card { background: var(--color-background-secondary); border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; }
.result-title { font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 4px; }
.result-sub { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
.result-body { display: grid; grid-template-columns: 1fr auto; gap: 1.5rem; align-items: start; }
.link-box { display: flex; align-items: center; gap: 8px; background: var(--color-background-primary); border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 8px 12px; margin-bottom: 12px; }
.link-url { font-size: 13px; color: var(--color-text-secondary); flex: 1; font-family: var(--font-sans); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pack-stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
.stat-pill { font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-primary); border: 1px solid var(--color-border-tertiary); border-radius: 20px; padding: 3px 10px; }
.result-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.result-label { margin-bottom: 6px; }
.qr-box { width: 160px; height: 160px; background: var(--color-background-primary); border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.packs-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.packs-summary { font-size: 13px; color: var(--color-text-secondary); }
.dm-error { font-size: 13px; color: #ff8a65; margin-top: 8px; }
#history-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 1rem; }
#history-modal.visible { display: flex; }
#history-modal .history-inner { background: var(--color-background-primary); border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 1.5rem; max-width: 520px; width: 100%; max-height: 85vh; overflow-y: auto; }
.history-list { display: flex; flex-direction: column; gap: 8px; }
.history-row { background: var(--color-background-secondary); border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 14px; }
.history-meta { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; }
.history-items { display: flex; gap: 6px; flex-wrap: wrap; }
.history-item { font-size: 12px; padding: 2px 8px; border-radius: 20px; background: var(--color-background-primary); border: 1px solid var(--color-border-tertiary); color: var(--color-text-primary); }
.history-item.reveal { background: rgba(255,213,79,0.2); color: var(--legendary); border-color: rgba(255,213,79,0.5); }
</style>
</head>
<body>
<div id="page-wrap">
<div class="dm-wrap">
  <div class="dm-header">
    <div class="dm-title">DM Dashboard</div>
    <div class="dm-key-bar">
      <div class="dm-key-input visible" id="dm-key-input">
        <input type="text" id="dm-key-field" placeholder="Enter DM key" autocomplete="off">
        <button type="button" class="btn-sm" id="dm-key-submit">Save key</button>
      </div>
      <div class="dm-key-pill" id="dm-key-pill" style="display:none;">Key: <span id="dm-key-display"></span></div>
      <button class="btn-sm" id="dm-key-change" style="display:none;">Change key</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" data-tab="packs">My packs</button>
    <button class="tab" data-tab="create">Create pack</button>
    <button class="tab" data-tab="result">Pack created</button>
    <button class="tab" data-tab="history" style="display:none;">History</button>
  </div>

  <div class="section visible" id="tab-packs">
    <div class="packs-toolbar">
      <span class="packs-summary" id="packs-summary">Enter your DM key to load packs.</span>
      <button class="btn-primary" id="btn-create-pack">+ Create pack</button>
    </div>
    <div class="dm-error" id="pack-error" style="display:none;"></div>
    <div class="pack-grid" id="pack-list"></div>
  </div>

  <div class="section" id="tab-create">
    <form id="create-form" class="form-grid">
      <div class="form-group full">
        <div class="form-label">Pack label</div>
        <input type="text" id="form-label" placeholder="e.g. BBEG Vault — Session 12" required>
      </div>
      <div class="form-group">
        <div class="form-label">Type</div>
        <div class="radio-group">
          <span class="radio-pill selected" data-type="shared">Shared</span>
          <span class="radio-pill" data-type="personal">Personal</span>
        </div>
      </div>
      <div class="form-group form-group-player" style="display:none;">
        <div class="form-label">Player name</div>
        <input type="text" id="form-player-name" placeholder="Player name">
      </div>
      <div class="form-group">
        <div class="form-label">Quantity</div>
        <div class="slider-row">
          <input type="range" id="form-quantity" min="1" max="20" value="1">
          <span class="slider-val" id="qty-val">1</span>
        </div>
      </div>
      <div class="form-group">
        <div class="form-label">CR hint</div>
        <div class="slider-row">
          <input type="range" id="form-cr" min="1" max="20" value="10">
          <span class="slider-val" id="cr-val">10</span>
        </div>
        <div class="tier-suggest" id="cr-suggest">Suggested: Rare – Very Rare</div>
      </div>
      <div class="form-group">
        <div class="form-label">Reveal tier min</div>
        <select id="form-tier-min">
          <option value="0">Mundane</option>
          <option value="1">Common</option>
          <option value="2">Uncommon</option>
          <option value="3" selected>Rare</option>
          <option value="4">Very Rare</option>
          <option value="5">Legendary</option>
        </select>
      </div>
      <div class="form-group">
        <div class="form-label">Reveal tier max</div>
        <select id="form-tier-max">
          <option value="0">Mundane</option>
          <option value="1">Common</option>
          <option value="2">Uncommon</option>
          <option value="3">Rare</option>
          <option value="4" selected>Very Rare</option>
          <option value="5">Legendary</option>
        </select>
      </div>
      <div class="form-group">
        <div class="form-label">Mundane item count</div>
        <div class="slider-row">
          <input type="range" id="form-mundane" min="1" max="5" value="3">
          <span class="slider-val" id="mundane-val">3</span>
        </div>
      </div>
      <div class="form-group full">
        <div class="form-label">Guaranteed item (optional)</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="text" id="form-item-search" placeholder="Search items..." autocomplete="off" style="flex:1;">
          <button type="button" class="btn-sm" id="form-item-clear" style="display:none;">Clear</button>
        </div>
        <input type="hidden" id="form-guaranteed-id" value="">
        <div class="search-result" id="search-results" style="display:none;"></div>
      </div>
      <div class="form-group full">
        <div class="form-label">Categories (leave all unchecked for any)</div>
        <div class="cat-grid" id="cat-grid"></div>
      </div>
      <div class="form-footer">
        <button type="button" class="btn-sm" id="form-cancel">Cancel</button>
        <button type="submit" class="btn-primary">Create pack</button>
      </div>
    </form>
  </div>

  <div class="section" id="tab-result">
    <div class="result-card">
      <div class="result-title" id="result-title"></div>
      <div class="result-sub" id="result-sub"></div>
      <div class="pack-stats" id="result-stats"></div>
      <div class="result-body">
        <div>
          <div class="form-label result-label">Shareable link</div>
          <div class="link-box">
            <span class="link-url" id="result-link-url"></span>
            <button type="button" class="btn-sm" id="result-copy">Copy</button>
          </div>
          <div class="result-actions">
            <button type="button" class="btn-sm" id="result-download-qr">Download QR as PNG</button>
            <button type="button" class="btn-sm" id="result-create-another">Create another</button>
            <button type="button" class="btn-sm" id="result-back">Back to packs</button>
          </div>
        </div>
        <div>
          <div class="form-label result-label">QR code</div>
          <div class="qr-box"><div id="qr-container"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
</div>

<div id="history-modal">
  <div class="history-inner" id="history-inner">
    <div class="history-header" id="history-header"></div>
    <div class="history-sub" id="history-sub"></div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>

<script src="assets/js/loot-constants.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="assets/js/dm-dashboard.js"></script>
</body>
</html>
