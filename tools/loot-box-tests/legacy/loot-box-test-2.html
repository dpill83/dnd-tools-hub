<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Loot Chest</title>
<style>
    body { margin:0; height:100vh; background:radial-gradient(circle at 50% 30%, #3a2f1f 0%, #0f0703 80%); display:flex; align-items:center; justify-content:center; font-family:Georgia,serif; color:#f4d9a8; overflow:hidden; }
    .scene { position:relative; width:90vmin; max-width:920px; text-align:center; }
    #chest-container { width:340px; height:260px; margin:0 auto 50px; cursor:pointer; position:relative; perspective:1200px; }
    #chest-container:hover svg { filter:drop-shadow(0 30px 50px #ffeb3b); }
    svg { filter:drop-shadow(0 20px 40px rgba(212,175,55,0.5)); }
    #golden-light { position:absolute; top:50%; left:50%; width:420px; height:420px; background:radial-gradient(circle,#ffeb3b 15%,transparent 65%); opacity:0; transform:translate(-50%,-50%); pointer-events:none; transition:opacity 1.2s; }
    #loot-row { display:flex; gap:30px; justify-content:center; flex-wrap:wrap; min-height:160px; }
    .item { width:100px; text-align:center; opacity:0; transform:scale(0.2) translateY(60px); transition:all .45s cubic-bezier(0.34,1.56,0.64,1); }
    .item.show { opacity:1; transform:scale(1) translateY(0); }
    .card-container { perspective:1000px; width:190px; height:270px; margin:30px auto; display:none; }
    .card { position:relative; width:100%; height:100%; transition:transform 1s cubic-bezier(0.175,0.885,0.32,1.275); transform-style:preserve-3d; }
    .card.flip { transform:rotateY(180deg); }
    .card-face { position:absolute; inset:0; backface-visibility:hidden; border-radius:14px; box-shadow:0 20px 40px rgba(0,0,0,0.7); }
    .card-back { background:linear-gradient(135deg,#4a2c0f,#1a1208); border:14px solid #ffd700; display:flex; align-items:center; justify-content:center; font-size:3.2rem; color:#ffeb3b; box-shadow:0 0 60px #ffd700; animation:pulse-glow 1.8s infinite alternate; }
    .card-front { background:linear-gradient(#1a1208,#0f0a05); border:14px solid #ffd700; transform:rotateY(180deg); padding:20px; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    @keyframes pulse-glow { from { box-shadow:0 0 30px #ffd700; } to { box-shadow:0 0 90px #ffeb3b; } }
    #result-text { font-size:2.6rem; font-weight:bold; text-shadow:0 0 30px gold; opacity:0; transition:opacity 1s; margin-top:20px; }
    #reset-hint { font-size:0.95rem; opacity:0; transition:opacity 0.8s; margin-top:12px; color:#c4a574; }
    #reset-hint.show { opacity:1; }
    @media (prefers-reduced-motion: reduce) {
        body.reduced-motion #golden-light { transition-duration:0.4s; }
        body.reduced-motion .item { transition-duration:0.15s; }
        body.reduced-motion .card { transition-duration:0.3s; }
        body.reduced-motion #result-text { transition-duration:0.3s; }
        body.reduced-motion #reset-hint { transition-duration:0.2s; }
    }
</style>
</head>
<body>
<div class="scene">
    <h1 style="margin-bottom:30px;letter-spacing:2px;text-shadow:0 0 25px #ffeb3b;">THE CHEST AWAITS...</h1>

    <div id="chest-container" role="button" tabindex="0" aria-label="Open loot chest">
        <svg width="340" height="260" viewBox="0 0 340 260" id="chest-svg">
            <!-- body -->
            <rect x="35" y="105" width="270" height="135" rx="10" fill="#5C3317" stroke="#D4AF37" stroke-width="22"/>
            <!-- gold bands -->
            <rect x="50" y="120" width="240" height="20" fill="#D4AF37"/>
            <rect x="50" y="195" width="240" height="14" fill="#D4AF37"/>
            <!-- lock -->
            <circle cx="170" cy="150" r="22" fill="#D4AF37"/>
            <rect x="163" y="138" width="14" height="24" fill="#3C2A1F"/>
            <!-- lid group -->
            <g id="lid-group">
                <path id="lid" d="M35 105 Q75 35 170 35 Q265 35 305 105 L305 110 L35 110 Z" fill="#5C3317" stroke="#D4AF37" stroke-width="22"/>
                <path d="M55 98 Q95 45 170 45 Q245 45 285 98" fill="none" stroke="#D4AF37" stroke-width="10"/>
            </g>
        </svg>
        <div id="golden-light"></div>
    </div>

    <div id="loot-row"></div>

    <!-- rarity card -->
    <div class="card-container" id="rarity-card">
        <div class="card" id="the-card">
            <div class="card-face card-back">✨</div>
            <div class="card-face card-front">
                <div id="item-emoji" style="font-size:4.5rem;margin-bottom:12px;"></div>
                <h3 id="item-name" style="margin:0 0 8px;font-size:1.7rem;color:#ffd700;"></h3>
                <p id="item-desc" style="margin:0;font-size:1rem;max-width:220px;color:#f4d9a8;"></p>
            </div>
        </div>
    </div>

    <div id="result-text">YOU FOUND A THING!</div>
    <p id="reset-hint" aria-live="polite">Press R to try again</p>
</div>

<script>
(function() {
    // Timing constants (shortened when user prefers reduced motion)
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reducedMotion) document.body.classList.add('reduced-motion');

    const LID_OPEN_MS = reducedMotion ? 300 : 700;
    const REVEAL_STAGGER_MS = reducedMotion ? 120 : 380;
    const BEFORE_LEGENDARY_MS = reducedMotion ? 400 : 1100;
    const CARD_FLIP_DELAY_MS = reducedMotion ? 300 : 800;
    const LID_TRANSITION_DURATION = reducedMotion ? '0.4s' : '1.1s';

    // Audio: create context on first user gesture to avoid autoplay block
    let audioCtx = null;
    function getAudioContext() {
        if (!audioCtx) {
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (Ctx) audioCtx = new Ctx();
        }
        return audioCtx;
    }
    function safePlay(fn) {
        try {
            const ctx = getAudioContext();
            if (!ctx) return;
            if (ctx.state === 'suspended') ctx.resume();
            if (ctx.state !== 'running') return;
            fn(ctx);
        } catch (_) {}
    }

    function playCreak(ctx) {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sawtooth';
        o.frequency.value = 85;
        o.connect(g);
        g.connect(ctx.destination);
        g.gain.value = 0.35;
        o.start();
        o.frequency.exponentialRampToValueAtTime(28, ctx.currentTime + 1.4);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.6);
        o.stop(ctx.currentTime + 1.7);
    }
    function playPop(ctx) {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = 'sine';
        o.frequency.value = 920;
        o.connect(g);
        g.connect(ctx.destination);
        g.gain.value = 0.4;
        o.start();
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
        o.stop(ctx.currentTime + 0.2);
    }
    function playTriumph(ctx) {
        const t = ctx.currentTime;
        const notes = [880, 1100, 1380, 1640];
        notes.forEach(function(f, i) {
            const o = ctx.createOscillator();
            const g = ctx.createGain();
            o.type = 'sine';
            o.frequency.value = f;
            o.connect(g);
            g.connect(ctx.destination);
            g.gain.value = 0.3;
            o.start(t + i * 0.09);
            g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.09 + 0.45);
            o.stop(t + i * 0.09 + 0.5);
        });
    }

    const chest = document.getElementById('chest-container');
    const lootRow = document.getElementById('loot-row');
    const cardContainer = document.getElementById('rarity-card');
    const theCard = document.getElementById('the-card');
    const itemEmojiEl = document.getElementById('item-emoji');
    const nameEl = document.getElementById('item-name');
    const descEl = document.getElementById('item-desc');
    const result = document.getElementById('result-text');
    const resetHint = document.getElementById('reset-hint');
    const light = document.getElementById('golden-light');

    const loot = [
        { emoji: '🪙', name: '50 Gold Pieces', desc: '', isLegendary: false },
        { emoji: '🧪', name: 'Potion of Healing', desc: 'Restores 2d4 + 2 HP', isLegendary: false },
        { emoji: '⚔️', name: 'Longsword', desc: '1d8 slashing damage', isLegendary: false },
        { emoji: '🧥', name: 'Cloak of Elvenkind', desc: 'Advantage on Stealth. Blend with nature.', isLegendary: true }
    ];

    let opened = false;

    function openChest() {
        if (opened) return;
        opened = true;
        chest.style.pointerEvents = 'none';

        safePlay(function(ctx) { playCreak(ctx); });
        const lid = document.getElementById('lid');
        lid.style.transition = 'transform ' + LID_TRANSITION_DURATION + ' cubic-bezier(0.25,0.1,0.25,1)';
        lid.style.transformOrigin = 'bottom center';
        lid.style.transform = 'rotateX(-82deg)';

        light.style.opacity = '0.65';
        setTimeout(function() { revealMundane(); }, LID_OPEN_MS);
    }

    chest.addEventListener('click', openChest);
    chest.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openChest();
        }
    });

    function revealMundane() {
        lootRow.innerHTML = '';
        loot.forEach(function(item, i) {
            const el = document.createElement('div');
            el.className = 'item';
            el.innerHTML = '<div style="font-size:4.8rem;margin-bottom:6px">' + item.emoji + '</div><div style="font-size:1.05rem">' + item.name + '</div>';
            lootRow.appendChild(el);

            setTimeout(function() {
                el.classList.add('show');
                safePlay(playPop);
                if (item.isLegendary) {
                    setTimeout(function() { showLegendary(item); }, BEFORE_LEGENDARY_MS);
                }
            }, i * REVEAL_STAGGER_MS);
        });
    }

    function showLegendary(item) {
        cardContainer.style.display = 'block';
        itemEmojiEl.textContent = item.emoji;
        nameEl.textContent = item.name;
        descEl.textContent = item.desc;
        setTimeout(function() {
            theCard.classList.add('flip');
            safePlay(playTriumph);
            result.style.opacity = '1';
            resetHint.classList.add('show');
        }, CARD_FLIP_DELAY_MS);
    }

    document.addEventListener('keydown', function(e) {
        if (e.key.toLowerCase() === 'r') location.reload();
    });
})();
</script>
</body>
</html>
